name: cypress.yml

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test:login

      - name: Generate Cucumber HTML report
        if: always()
        run: npm run report:cucumber

      - name: Generate GitHub Actions summary
        if: always()
        run: |
          echo "## Cypress Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | cypress.yml |" >> $GITHUB_STEP_SUMMARY
          echo "| Job | cypress-run |" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | SauceDemo Login |" >> $GITHUB_STEP_SUMMARY
          echo "| Comando ejecutado | npm run test:login |" >> $GITHUB_STEP_SUMMARY
          echo "| Reporte HTML | cypress-cucumber-html-report artifact |" >> $GITHUB_STEP_SUMMARY
          echo "| Videos | cypress-videos artifact |" >> $GITHUB_STEP_SUMMARY
          echo "| Screenshots | Solo si falla |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cypress-cucumber-html-report
          path: reports/cucumber-html
          if-no-files-found: warn

      - name: Upload Cucumber JSON report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cypress-cucumber-json-report
          path: reports/cucumber-json
          if-no-files-found: warn

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: warn

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore